<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roma: Ascensão</title>

<style>
body {
  margin:0;
  font-family: Arial;
  color:white;
  text-align:center;
  background-size:cover;
  background-position:center;
  transition: background 1s ease-in-out;
}

.overlay {
  background: rgba(0,0,0,0.7);
  min-height:100vh;
  padding:20px;
}

h1 { color: gold; }

.box {
  border:2px solid gold;
  padding:20px;
  border-radius:10px;
  margin-top:20px;
  background: rgba(0,0,0,0.6);
  opacity:0;
  transform: translateY(20px);
  animation: fadeIn 0.8s forwards;
}

button {
  padding:12px;
  margin:5px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  background:gold;
  font-weight:bold;
  transition: transform 0.2s;
}

button:hover {
  transform: scale(1.05);
}

.character {
  width:140px;
  margin-top:10px;
  animation: fadeIn 1s;
}

@keyframes fadeIn {
  from { opacity:0; transform: translateY(20px); }
  to { opacity:1; transform: translateY(0); }
}

.dialogo {
  font-size:18px;
  margin-top:10px;
}
</style>
</head>

<body>
<div class="overlay">

<h1>🏛️ Roma: Ascensão</h1>

<img id="char" class="character" src="https://i.imgur.com/8QfQZ7T.png">

<div class="box">
  <div id="nome"></div>
  <div id="historia" class="dialogo">Clique em uma opção para começar</div>
</div>

<div id="botoes"></div>

<p>❤️ Vida: <span id="vida">3</span> | 🤝 Influência: <span id="infl">2</span></p>

<audio id="bgm" loop autoplay>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_6f0c9fbb0f.mp3" type="audio/mp3">
</audio>

<script>
let vida=3, infl=2, etapa=0;

const cenas = [
  {
    nome:"Caio Márcio",
    texto:"Roma está em crise... o povo passa fome e olha para você em busca de solução.",
    opcoes:["Buscar recursos","Pedir ajuda","Controlar comida"]
  },
  {
    nome:"Conselheiro",
    texto:"Senhor, a cidade está entrando em conflito! Precisamos agir agora.",
    opcoes:["Reprimir","Negociar","Ignorar"]
  },
  {
    nome:"Povo",
    texto:"Decida nosso destino! Quem governará Roma?",
    opcoes:["Virar líder","Dividir poder","Fugir"]
  }
];

function atualizar(){
 document.getElementById("vida").innerText=vida;
 document.getElementById("infl").innerText=infl;
 if(vida<=0) fimMorte();
}

function dado(){ return Math.floor(Math.random()*6)+1; }

function escolher(){
 let n=dado();
 let h=document.getElementById("historia");

 if(n<=2){ vida--; h.innerHTML="❌ Falha..."; }
 else if(n<=4){ h.innerHTML="⚠️ Parcial..."; }
 else { infl++; h.innerHTML="✅ Sucesso!"; }

 atualizar();

 setTimeout(()=>{ etapa++; render(); },1200);
}

function render(){
 let cena=cenas[etapa];
 if(!cena) return final();

 document.getElementById("nome").innerHTML="<b>"+cena.nome+"</b>";
 document.getElementById("historia").innerHTML=cena.texto;

 let html="";
 cena.opcoes.forEach(op=>{
  html+=`<button onclick="escolher()">${op}</button>`;
 });
 document.getElementById("botoes").innerHTML=html;
}

function final(){
 let h=document.getElementById("historia");
 let b=document.getElementById("botoes");

 if(infl>=4) h.innerHTML="👑 Roma prospera sob seu comando!";
 else if(vida<=0) h.innerHTML="💀 Você morreu.";
 else h.innerHTML="⚔️ Roma entra em caos.";

 b.innerHTML="<button onclick='location.reload()'>Jogar novamente</button>";
}

function fimMorte(){
 document.getElementById("historia").innerHTML="💀 Você morreu.";
 document.getElementById("botoes").innerHTML="<button onclick='location.reload()'>Reiniciar</button>";
}

render();
</script>

</div>
</body>
</html>
