<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roma: Crise e Poder</title>

<style>
body { margin:0; font-family:Arial; background:black; color:white; overflow:hidden;}
#bg { position:fixed; width:100%; height:100%; background-size:cover; background-position:center; transition:1s; }
#char { position:absolute; bottom:120px; left:50%; transform:translateX(-50%); height:300px; }

.ui {
  position:absolute; bottom:0; width:100%;
  background:rgba(0,0,0,0.85);
  padding:15px; border-top:3px solid gold;
}

.nome { color:gold; font-weight:bold; }
.texto { margin-top:5px; min-height:70px; }

.opcoes button {
  margin:5px; padding:10px;
  border:none; border-radius:8px;
  background:gold; font-weight:bold;
}

.status {
  position:absolute; top:10px; left:10px;
}

.menu {
  position:absolute; width:100%; height:100%;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:black;
}

button { cursor:pointer; }
</style>
</head>

<body>

<div id="bg"></div>
<img id="char">

<div class="status">
🍞 Recursos: <span id="rec">2</span><br>
⚖️ Ordem: <span id="ord">2</span>
</div>

<!-- MENU -->
<div id="menu" class="menu">
  <h1>🏛️ Roma: Crise e Poder</h1>
  <p>Você é um líder responsável pela sobrevivência de Roma.</p>
  <button onclick="start()">Começar</button>
</div>

<!-- JOGO -->
<div id="game" style="display:none;">
  <div class="ui">
    <div id="nome" class="nome"></div>
    <div id="texto" class="texto"></div>
    <div id="opcoes"></div>
  </div>
</div>

<script>
let rec=2;
let ord=2;

const cenas = {

inicio:{
 nome:"Narrador",
 texto:"Roma enfrenta fome. O povo exige soluções imediatas.",
 bg:"https://images.unsplash.com/photo-rome",
 img:"https://i.imgur.com/8QfQZ7T.png",
 op:[
  {t:"Enviar tropas buscar comida", p:"campo", r:1},
  {t:"Negociar com cidades vizinhas", p:"alianca", r:0},
  {t:"Racionar comida", p:"racionamento", o:1}
 ]
},

campo:{
 nome:"General",
 texto:"Podemos saquear vilas próximas, mas isso pode gerar guerra.",
 bg:"https://images.unsplash.com/photo-war",
 img:"https://i.imgur.com/1X6K7Yh.png",
 op:[
  {t:"Atacar", p:"resultadoAtaque", r:2, o:-1},
  {t:"Recuar", p:"inicio", o:1}
 ]
},

alianca:{
 nome:"Emissário",
 texto:"Algumas cidades aceitam negociar, mas pedem apoio militar.",
 bg:"https://images.unsplash.com/photo-city",
 img:"https://i.imgur.com/Z6X7FZg.png",
 op:[
  {t:"Aceitar acordo", p:"resultadoAlianca", r:1, o:1},
  {t:"Recusar", p:"inicio"}
 ]
},

racionamento:{
 nome:"Povo",
 texto:"O povo está revoltado com a falta de comida.",
 bg:"https://images.unsplash.com/photo-dark",
 img:"https://i.imgur.com/Z6X7FZg.png",
 op:[
  {t:"Reprimir revolta", p:"resultadoRepressao", o:2},
  {t:"Ceder ao povo", p:"inicio", o:-1}
 ]
},

resultadoAtaque:{
 nome:"Narrador",
 texto:"Roma conseguiu comida, mas agora enfrenta inimigos.",
 final:true
},

resultadoAlianca:{
 nome:"Narrador",
 texto:"Roma cresce com alianças e estabilidade.",
 final:true
},

resultadoRepressao:{
 nome:"Narrador",
 texto:"A ordem foi mantida, mas o povo teme seu governo.",
 final:true
}

};

function start(){
 document.getElementById("menu").style.display="none";
 document.getElementById("game").style.display="block";
 load("inicio");
}

function efeito(texto, el){
 el.innerHTML="";
 let i=0;
 let t=setInterval(()=>{
  el.innerHTML+=texto[i];
  i++;
  if(i>=texto.length) clearInterval(t);
 },25);
}

function load(id){
 let c=cenas[id];

 document.getElementById("bg").style.backgroundImage=`url(${c.bg})`;
 document.getElementById("char").src=c.img;
 document.getElementById("nome").innerText=c.nome;

 efeito(c.texto, document.getElementById("texto"));

 let html="";

 if(c.final){
  html=`<button onclick="location.reload()">🔄 Jogar novamente</button>`;
 } else {
  c.op.forEach(o=>{
   html+=`<button onclick="escolha('${o.p}',${o.r||0},${o.o||0})">${o.t}</button>`;
  });
 }

 document.getElementById("opcoes").innerHTML=html;
 atualizar();
}

function escolha(prox, r, o){
 rec+=r;
 ord+=o;
 load(prox);
}

function atualizar(){
 document.getElementById("rec").innerText=rec;
 document.getElementById("ord").innerText=ord;
}
</script>

</body>
</html>
